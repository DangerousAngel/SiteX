<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="SiteX — Discover and analyze any website's full digital fingerprint: IP, hosting, tech stack, DNS, headers, and more." />
  <title>SiteX — Site Intelligence Tool</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <div class="wrapper" id="mainWrapper">
    <!-- Hero -->
    <div class="hero" id="heroBlock">
      <div class="logo">SiteX</div>
      <div class="logo-tagline">Site Intelligence Tool</div>
    </div>

    <!-- Search -->
    <div class="search-container">
      <div class="search-row">
        <input type="url" id="siteInput" placeholder="https://example.com" autocomplete="off" spellcheck="false" aria-label="Enter website URL" />
        <button id="lookupBtn" aria-label="Look up website information">
          LOOK UP
        </button>
      </div>
      <span class="hint-text">Enter any website URL to reveal its full digital fingerprint</span>
    </div>

    <!-- Status -->
    <div id="statusBar">
      <div class="status-dot"></div>
      <span id="statusText">Scanning...</span>
    </div>

    <!-- Results -->
    <div id="resultsSection">
      <div class="results-header">
        <div class="results-title">Results for <span id="resultsDomain">—</span></div>
        <button id="downloadBtn" aria-label="Download results as JSON">
          <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path d="M12 5v14M5 12l7 7 7-7"/>
          </svg>
          Export JSON
        </button>
      </div>
      <div class="cards-grid" id="cardsGrid"></div>
    </div>
  </div>

  <!-- Footer -->
  <footer>
    Developed by <a href="https://github.com/DangerousAngel/" target="_blank" rel="noopener">DangerousAngel</a>
  </footer>

  <script src="sc.js"></script>
</body>
</html>
